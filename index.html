<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live YouTube Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .stat-value { font-size: 6rem; font-weight: 800; letter-spacing: -4px; line-height: 1; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        .live-dot { height: 12px; width: 12px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; box-shadow: 0 0 15px #ff0000; }
        .counter-container { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-2xl">
        <!-- Dashboard Config -->
        <div class="glass rounded-3xl p-8 mb-8 border-b-2 border-white/5">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-bold flex items-center gap-3 tracking-tighter">
                    <span class="live-dot"></span> ANALYTICS ENGINE
                </h1>
                <span class="text-[9px] text-gray-500 uppercase tracking-[0.3em] font-black">Secure Link</span>
            </div>
            
            <div class="space-y-5">
                <div class="relative">
                    <label class="text-[10px] uppercase tracking-widest text-gray-500 absolute -top-2 left-4 bg-[#0d0d0d] px-2 font-bold">API Key</label>
                    <input type="password" id="apiKey" value="AIzaSyA7R4L1SwCtdZTt2SLM5mqA2u6zdKiToKg" 
                        class="w-full bg-transparent border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-red-600 transition-all text-sm">
                </div>
                <div class="relative">
                    <label class="text-[10px] uppercase tracking-widest text-gray-500 absolute -top-2 left-4 bg-[#0d0d0d] px-2 font-bold">Channel</label>
                    <input type="text" id="channelInput" placeholder="@username or UC..." 
                        class="w-full bg-transparent border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-red-600 transition-all text-sm">
                </div>
                <button onclick="startTracking()" class="w-full bg-red-600 text-white hover:bg-red-700 font-black py-4 rounded-2xl transition-all uppercase tracking-widest text-xs shadow-lg shadow-red-900/20">
                    Sync Live Data
                </button>
            </div>
        </div>

        <!-- Metric Display -->
        <div id="displayArea" class="hidden counter-container opacity-0 translate-y-8">
            <div class="glass rounded-[3rem] p-12 text-center relative overflow-hidden">
                <div id="channelHeader" class="flex flex-col items-center mb-10">
                    <div class="relative">
                        <img id="avatar" src="" class="w-32 h-32 rounded-full border-4 border-red-600 mb-4 hidden object-cover shadow-[0_0_50px_rgba(255,0,0,0.2)]">
                    </div>
                    <h2 id="channelName" class="text-4xl font-black tracking-tighter text-white uppercase italic">---</h2>
                </div>
                
                <div class="space-y-2">
                    <p class="text-[10px] uppercase tracking-[0.5em] text-red-500 font-black">Subscriber Count</p>
                    <div id="subCount" class="stat-value text-white tabular-nums drop-shadow-2xl">0</div>
                </div>
                
                <div class="grid grid-cols-2 gap-8 mt-14 pt-12 border-t border-white/5">
                    <div class="text-center">
                        <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">Total Views</p>
                        <p id="viewCount" class="text-3xl font-black tracking-tight text-white italic">0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">Total Videos</p>
                        <p id="videoCount" class="text-3xl font-black tracking-tight text-white italic">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="errorBox" class="hidden mt-6 p-5 bg-red-950/20 border border-red-900/50 text-red-400 rounded-2xl text-center text-xs font-bold uppercase tracking-widest"></div>
    </div>

    <script>
        let intervalId = null;

        // Formatter for "Social Media Style" numbers (1K, 1M, etc)
        const compactFormatter = new Intl.NumberFormat('en-US', {
            notation: 'compact',
            compactDisplay: 'short',
            maximumFractionDigits: 1
        });

        async function startTracking() {
            const key = document.getElementById('apiKey').value.trim();
            let input = document.getElementById('channelInput').value.trim();
            const errorBox = document.getElementById('errorBox');
            const displayArea = document.getElementById('displayArea');

            if (!key || !input) {
                showError("Missing credentials, bro! (•ิ_•ิ)");
                return;
            }

            errorBox.classList.add('hidden');
            if (intervalId) clearInterval(intervalId);

            try {
                let channelId = input;
                if (input.startsWith('@') || !input.startsWith('UC')) {
                    const handle = input.startsWith('@') ? input : '@' + input;
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${handle}&key=${key}`);
                    const data = await res.json();
                    
                    if (data.error) throw new Error(data.error.message);
                    if (data.items && data.items.length > 0) {
                        channelId = data.items[0].id;
                    } else {
                        throw new Error("Channel handle not recognized.");
                    }
                }

                await updateStats(channelId, key);
                intervalId = setInterval(() => updateStats(channelId, key), 10000); 
                
                displayArea.classList.remove('hidden');
                setTimeout(() => {
                    displayArea.classList.add('opacity-100', 'translate-y-0');
                    displayArea.classList.remove('translate-y-8');
                }, 100);
                
            } catch (err) {
                showError(err.message);
            }
        }

        async function updateStats(id, key) {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${key}`);
                const data = await res.json();

                if (data.items && data.items.length > 0) {
                    const stats = data.items[0].statistics;
                    const snippet = data.items[0].snippet;

                    // Applying the compact format here
                    document.getElementById('subCount').innerText = compactFormatter.format(stats.subscriberCount);
                    document.getElementById('viewCount').innerText = compactFormatter.format(stats.viewCount);
                    document.getElementById('videoCount').innerText = Number(stats.videoCount).toLocaleString();
                    document.getElementById('channelName').innerText = snippet.title;
                    
                    const avatar = document.getElementById('avatar');
                    avatar.src = snippet.thumbnails.high.url;
                    avatar.classList.remove('hidden');
                }
            } catch (err) {
                console.error("Pulse Failed:", err);
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerText = `[SYSTEM ERROR] ${msg}`;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
